name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - auth
      browser:
        description: 'Browser'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4
      with:
        version: 10.26.1

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: pnpm exec playwright install --with-deps

    - name: Install Playwright system dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: pnpm exec playwright install-deps

    - name: Run Playwright tests
      run: |
        ARGS=""
        SUITE="${{ inputs.suite }}"
        BROWSER="${{ inputs.browser }}"
        [ -n "$SUITE" ] && [ "$SUITE" != "all" ] && ARGS="$ARGS tests/$SUITE/"
        [ -n "$BROWSER" ] && [ "$BROWSER" != "all" ] && ARGS="$ARGS --project=$BROWSER"
        pnpm exec playwright test $ARGS

    - name: Upload report as artifact
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: >-
          ${{ github.event_name == 'pull_request'
            && format('playwright-report-pr-{0}', github.event.number)
            || github.event_name == 'workflow_dispatch'
            && format('playwright-report-manual-{0}', github.run_id)
            || 'playwright-report-main' }}
        path: playwright-report/
        retention-days: 30

    - name: Post report link as PR comment
      uses: actions/github-script@v7
      if: ${{ !cancelled() && github.event_name == 'pull_request' }}
      with:
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const run_url = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
          const body = [
            '## Playwright Test Report',
            '',
            `📊 [Download report](${run_url}#artifacts)`,
            '',
            `_Run: [#${context.runId}](${run_url}) • ${new Date().toUTCString()}_`,
          ].join('\n');

          const comments = await github.rest.issues.listComments({
            owner, repo, issue_number: context.issue.number,
          });
          const existing = comments.data.find(
            c => c.user.login === 'github-actions[bot]' && c.body.includes('## Playwright Test Report')
          );
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number: context.issue.number, body });
          }

    - name: Upload report for GitHub Pages
      uses: actions/upload-pages-artifact@v3
      if: ${{ !cancelled() && github.event_name == 'push' }}
      with:
        path: playwright-report/

  deploy-report:
    needs: test
    if: ${{ !cancelled() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
